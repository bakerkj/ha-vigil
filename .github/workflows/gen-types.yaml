name: gen-types

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Regenerate the frontend API types from the backend wire types and fail if the
# committed output is stale. Needs both envs: uv (pydantic + the HA-importing
# models) and node (json-schema-to-typescript).
jobs:
  gen-types:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-suffix: gen-types
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version-file: .python-version
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
      - run: npm ci
      - run: uv run python scripts/gen_frontend_types.py
      - name: Fail if the generated frontend types are stale
        run: >-
          git diff --exit-code --
          custom_components/vigil/frontend/vigil-api.generated.d.ts
