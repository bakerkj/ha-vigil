name: gen-types

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Regenerate the frontend API types from the backend wire types and fail if the
# committed output is stale. Needs both envs: uv (pydantic + the HA-importing
# models) and node (json-schema-to-typescript).
jobs:
  gen-types:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-suffix: gen-types
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version-file: .python-version
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - run: npm ci
      - run: uv run python scripts/gen_frontend_types.py
      - name: Fail if the generated frontend types are stale
        run: >-
          git diff --exit-code --
          custom_components/vigil/frontend/vigil-api.generated.d.ts
