name: gen-types

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Regenerate the frontend API types from the backend wire types and fail if the
# committed output is stale. Needs both envs: uv (pydantic + the HA-importing
# models) and node (json-schema-to-typescript).
jobs:
  gen-types:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-suffix: gen-types
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - run: npm ci
      - run: uv run python scripts/gen_frontend_types.py
      - name: Fail if the generated frontend types are stale
        run: >-
          git diff --exit-code --
          custom_components/vigil/frontend/vigil-api.generated.d.ts
